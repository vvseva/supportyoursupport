<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlock Soul Transfer</title>
  <style>
    /* 1-Bit Sharp Pixel Aesthetic */
    :root {
      --bg-color: #ffffff;
      --fg-color: #000000;
    }

    body {
      background-color: var(--bg-color);
      background-image: url('https://deadlock.wiki/images/Sinners_Sacrifice.png');
      background-repeat: repeat;
      background-size: auto;
      color: var(--fg-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 1rem;
      box-sizing: border-box;
    }

    .window {
      background: var(--bg-color);
      border: 2px solid var(--fg-color);
      box-shadow: 6px 6px 0 var(--fg-color);
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
    }

    /* Classic striped title bar */
    .title-bar {
      border-bottom: 2px solid var(--fg-color);
      padding: 4px 8px;
      text-align: center;
      background: repeating-linear-gradient(
        0deg,
        var(--bg-color),
        var(--bg-color) 1px,
        var(--fg-color) 1px,
        var(--fg-color) 2px
      );
    }

    .title-bar-text {
      background: var(--bg-color);
      padding: 0 8px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .content {
      padding: 24px;
      text-align: center;
    }

    .header-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 48px;
      height: auto;
      border: 2px solid var(--fg-color);
      background-color: var(--fg-color);
      image-rendering: pixelated;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      text-transform: uppercase;
      text-align: left;
    }

    .instruction {
      margin-bottom: 16px;
      font-weight: bold;
    }

    .tile-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    button, input {
      font-family: inherit;
      font-size: 16px;
      border: 2px solid var(--fg-color);
      background: var(--bg-color);
      color: var(--fg-color);
      padding: 10px;
      cursor: pointer;
      box-sizing: border-box;
      outline: none;
    }

    button {
      font-weight: bold;
      transition: background 0s, color 0s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover, button:active, button.selected {
      background: var(--fg-color);
      color: var(--bg-color);
    }
    
    /* Invert the soul icon when the button is selected/hovered to maintain the 1-bit look */
    button:hover .soul-icon, button:active .soul-icon, button.selected .soul-icon {
      filter: invert(1);
    }

    .soul-btn {
      flex: 1;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .soul-icon {
      width: 16px;
      height: auto;
      image-rendering: pixelated;
    }

    input[type="number"] {
      width: 100%;
      font-size: 18px;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      text-transform: uppercase;
    }

    .hidden {
      display: none !important;
    }

    .success-msg {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

  <!-- Main Tip Screen -->
  <div class="window" id="transfer-window">
    <div class="title-bar">
      <span class="title-bar-text">SOUL_TRANSFER_PROTOCOL</span>
    </div>
    <div class="content">
      
      <div class="header-group">
        <img src="https://deadlock.wiki/images/c/c2/Rescue_Beam.png" alt="Rescue Beam" class="header-icon">
        <h1>Were you saved by Goombert Gooombert?</h1>
      </div>

      <p class="instruction">Select your tip amount.</p>
      
      <div class="tile-row">
        <button type="button" class="soul-btn" data-value="800">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 800
        </button>
        <button type="button" class="soul-btn" data-value="1600">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 1600
        </button>
        <button type="button" class="soul-btn" data-value="3200">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 3200
        </button>
      </div>

      <form id="tip-form">
        <div class="input-group">
          <label for="custom-souls">
            Custom amount <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls">:
          </label>
          <input type="number" id="custom-souls" min="1" placeholder="Enter custom souls..." required>
        </div>
        <button type="submit" class="submit-btn">Send Tips</button>
      </form>
    </div>
  </div>

  <!-- Confirmation Screen -->
  <div class="window hidden" id="success-window">
    <div class="title-bar">
      <span class="title-bar-text">TRANSFER_COMPLETE</span>
    </div>
    <div class="content">
      <p class="success-msg"><strong>Thank you for supporting your support.</strong></p>
      <button type="button" class="submit-btn" id="reset-btn">Initiate New Transfer</button>
    </div>
  </div>

  <script>
    const soulBtns = document.querySelectorAll('.soul-btn');
    const customInput = document.getElementById('custom-souls');
    const tipForm = document.getElementById('tip-form');
    const transferWindow = document.getElementById('transfer-window');
    const successWindow = document.getElementById('success-window');
    const resetBtn = document.getElementById('reset-btn');

    soulBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        soulBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        customInput.value = btn.getAttribute('data-value');
      });
    });

    customInput.addEventListener('input', () => {
      soulBtns.forEach(b => b.classList.remove('selected'));
    });

    tipForm.addEventListener('submit', (e) => {
      e.preventDefault(); 
      const soulsToTip = customInput.value;
      
      if(soulsToTip) {
        transferWindow.classList.add('hidden');
        successWindow.classList.remove('hidden');
      }
    });

    resetBtn.addEventListener('click', () => {
      tipForm.reset();
      soulBtns.forEach(b => b.classList.remove('selected'));
      successWindow.classList.add('hidden');
      transferWindow.classList.remove('hidden');
    });
  </script>
</body>
</html>
