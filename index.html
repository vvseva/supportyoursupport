<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlock Soul Transfer</title>
  
  <!-- Chart.js for Visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Default / Viscous Theme (Green) */
    :root {
      --bg-color: #1a1625;
      --fg-color: #8cff9e;
      --bg-image: url('https://deadlock.wiki/images/0/04/Viscous_Neon_Prime.png'); 
    }

    /* Rem Theme (Nighttime Blue) */
    [data-theme="rem"] {
      --bg-color: #0b1320;
      --fg-color: #4da6ff;
      --bg-image: url('https://deadlock.wiki/images/a/ad/Rem_Voting_Thank_You.png');
    }

    /* Dynamo Theme (Gold) */
    [data-theme="dynamo"] {
      --bg-color: #241a0f;
      --fg-color: #ffc107;
      --bg-image: url('https://deadlock.wiki/images/4/44/Dynamo_VN.png');
    }

    body {
      background-color: var(--bg-color);
      background-image: var(--bg-image);
      background-size: 300px auto;
      background-position: top left;
      background-repeat: repeat;
      color: var(--fg-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 1rem;
      box-sizing: border-box;
      transition: background-color 0.3s, color 0.3s, background-image 0.5s ease-in-out;
    }

    .window {
      background: var(--bg-color);
      border: 2px solid var(--fg-color);
      box-shadow: 6px 6px 0 var(--fg-color);
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
      transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
    }

    .title-bar {
      border-bottom: 2px solid var(--fg-color);
      padding: 4px 8px;
      text-align: center;
      background: repeating-linear-gradient(
        0deg,
        var(--bg-color),
        var(--bg-color) 1px,
        var(--fg-color) 1px,
        var(--fg-color) 2px
      );
    }

    .title-bar-text {
      background: var(--bg-color);
      padding: 0 8px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--fg-color);
    }

    .content {
      padding: 24px;
      text-align: center;
    }

    .header-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-icon {
      width: 48px;
      height: auto;
      border: 2px solid var(--fg-color);
      background-color: var(--fg-color);
      image-rendering: pixelated;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      text-transform: uppercase;
      text-align: left;
    }

    .instruction {
      margin-bottom: 16px;
      font-weight: bold;
    }

    .tile-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    button, input {
      font-family: inherit;
      font-size: 16px;
      border: 2px solid var(--fg-color);
      background: var(--bg-color);
      color: var(--fg-color);
      padding: 10px;
      cursor: pointer;
      box-sizing: border-box;
      outline: none;
    }

    button {
      font-weight: bold;
      transition: background 0.1s, color 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover, button:active, button.selected {
      background: var(--fg-color);
      color: var(--bg-color);
    }

    button:hover .soul-icon, button:active .soul-icon, button.selected .soul-icon {
      filter: invert(1);
    }

    .soul-btn {
      flex: 1;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .soul-icon {
      width: 16px;
      height: auto;
      image-rendering: pixelated;
    }

    input[type="number"] {
      width: 100%;
      font-size: 18px;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input::placeholder {
      color: var(--fg-color);
      opacity: 0.5;
    }

    .submit-btn {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      text-transform: uppercase;
    }

    .hidden {
      display: none !important;
    }
    
    .success-gif {
      max-width: 100px;
      height: auto;
      margin: 0 auto 16px auto;
      display: block;
      border: 2px solid var(--fg-color);
      image-rendering: pixelated;
    }

    .success-msg {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    /* Chart Container Styling */
    .chart-container {
      width: 100%;
      height: 150px;
      margin-bottom: 24px;
      border: 2px solid var(--fg-color);
      box-sizing: border-box;
      padding: 8px;
      background: var(--bg-color);
    }
  </style>
</head>
<body>

  <!-- Main Tip Screen -->
  <div class="window" id="transfer-window">
    <div class="title-bar">
      <span class="title-bar-text">SOUL_TRANSFER_PROTOCOL</span>
    </div>
    <div class="content">
      
      <div class="header-group">
        <img src="https://deadlock.wiki/images/c/c2/Rescue_Beam.png" alt="Rescue Beam" class="header-icon">
        <h1>Were you saved by Goombert Gooombert?</h1>
      </div>

      <p class="instruction">Select your tip amount.</p>
      
      <div class="tile-row">
        <button type="button" class="soul-btn" data-value="800">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 800
        </button>
        <button type="button" class="soul-btn" data-value="1600">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 1600
        </button>
        <button type="button" class="soul-btn" data-value="3200">
          <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls"> 3200
        </button>
      </div>

      <form id="tip-form">
        <div class="input-group">
          <label for="custom-souls">
            Custom amount <img src="https://deadlock.wiki/images/thumb/4/45/Souls.png/21px-Souls.png.webp" class="soul-icon" alt="souls">:
          </label>
          <input type="number" id="custom-souls" min="1" placeholder="Enter custom souls..." required>
        </div>
        <button type="submit" class="submit-btn">Send Tips</button>
      </form>
    </div>
  </div>

  <!-- Confirmation Screen -->
  <div class="window hidden" id="success-window">
    <div class="title-bar">
      <span class="title-bar-text">TRANSFER_COMPLETE</span>
    </div>
    <div class="content">
      <img src="img/viscous.gif" alt="Hero Response" class="success-gif" id="success-gif">
      <p class="success-msg"><strong>Thank you for supporting your support.</strong></p>
      
      <!-- Visualization Canvas -->
      <div class="chart-container">
        <canvas id="tipChart"></canvas>
      </div>

      <button type="button" class="submit-btn" id="reset-btn">Initiate New Transfer</button>
    </div>
  </div>

  <script type="module">

  // Import the functions you need from the SDKs you need

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAnalytics, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";

  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries
  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyC-03xng3uqqQ0QOHtBgxto7ocGNwNThXQ",
      authDomain: "supportyoursupport.firebaseapp.com",
      databaseURL: "https://supportyoursupport-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "supportyoursupport",
      storageBucket: "supportyoursupport.firebasestorage.app",
      messagingSenderId: "735891274194",
      appId: "1:735891274194:web:3d57607bd48f7eb059f00b",
      measurementId: "G-0XQSBTRQM9"
    };

  // Initialize Firebase

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const tipsRef = ref(database, 'supportyoursupport');
    // MODULE 2: Global State & Theming
    const themeData = {
      viscous: { gifPath: 'img/viscous.gif' },
      rem:     { gifPath: 'img/rem.gif' },
      dynamo:  { gifPath: 'img/dynamo.gif' }
    };

    const REMOTE_JSON_URL = 'https://gist.githubusercontent.com/vvseva/5f66e5edba811f8fb53ca12d5a4cd79a/raw/theme.json';

    // Helper to extract the active CSS foreground color for the chart
    const getThemeColor = () => getComputedStyle(document.body).getPropertyValue('--fg-color').trim();

    function applyTheme(themeName) {
      if (!themeData[themeName]) return;
      document.body.setAttribute('data-theme', themeName);
      document.getElementById('success-gif').src = themeData[themeName].gifPath;
      
      // Update chart colors instantly if the theme changes
      if (window.tipChartInstance) {
        window.tipChartInstance.data.datasets[0].borderColor = getThemeColor();
        window.tipChartInstance.options.scales.y.ticks.color = getThemeColor();
        window.tipChartInstance.update();
      }
    }

    async function fetchGlobalTheme() {
      try {
        const response = await fetch(REMOTE_JSON_URL + '?t=' + new Date().getTime());
        const data = await response.json();
        if (data.theme && themeData[data.theme]) applyTheme(data.theme);
      } catch (error) {
        console.error("Theme fetch failed. Defaulting.", error);
        applyTheme('viscous');
      }
    }

    // MODULE 3: Chart.js Initialization
    const ctx = document.getElementById('tipChart').getContext('2d');
    
    // Establishing a sharp, non-aliased aesthetic to match the UI
    window.tipChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: 'Souls Transferred',
          data: [],
          backgroundColor: 'transparent',
          borderColor: '#8cff9e', // Default fallback
          borderWidth: 2,
          borderRadius: 0, // Sharp corners
          barPercentage: 0.8,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false, // Disabling animation for true 1-bit feel
        scales: {
          x: {
            display: false // Hide x-axis clutter
          },
          y: {
            beginAtZero: true,
            grid: {
              color: 'rgba(255, 255, 255, 0.1)',
              tickLength: 0
            },
            ticks: {
              color: '#8cff9e',
              font: { family: 'Courier New', size: 10 },
              maxTicksLimit: 5
            },
            border: { display: false }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#000',
            titleFont: { family: 'Courier New' },
            bodyFont: { family: 'Courier New' },
            cornerRadius: 0,
            displayColors: false
          }
        }
      }
    });

    // MODULE 4: Data Flow & Event Listeners
    const soulBtns = document.querySelectorAll('.soul-btn');
    const customInput = document.getElementById('custom-souls');
    const tipForm = document.getElementById('tip-form');
    const transferWindow = document.getElementById('transfer-window');
    const successWindow = document.getElementById('success-window');
    const resetBtn = document.getElementById('reset-btn');

    soulBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        soulBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        customInput.value = btn.getAttribute('data-value');
      });
    });

    customInput.addEventListener('input', () => {
      soulBtns.forEach(b => b.classList.remove('selected'));
    });

    tipForm.addEventListener('submit', (e) => {
      e.preventDefault(); 
      const soulsToTip = parseInt(customInput.value, 10);
      
      if(soulsToTip) {
        // Compose the payload and write to Firebase
        push(tipsRef, {
          amount: soulsToTip,
          timestamp: Date.now()
        });

        // Transition UI
        transferWindow.classList.add('hidden');
        successWindow.classList.remove('hidden');
        
        // Ensure chart colors align with the active theme upon opening
        applyTheme(document.body.getAttribute('data-theme') || 'viscous');
      }
    });

    resetBtn.addEventListener('click', () => {
      tipForm.reset();
      soulBtns.forEach(b => b.classList.remove('selected'));
      successWindow.classList.add('hidden');
      transferWindow.classList.remove('hidden');
    });

    // Subscribing to the latest 20 tips from the database to render the graph
    const recentTipsQuery = query(tipsRef, limitToLast(20));
    onValue(recentTipsQuery, (snapshot) => {
      const tipsData = [];
      snapshot.forEach((childSnapshot) => {
        tipsData.push(childSnapshot.val().amount);
      });

      // Update Chart.js data
      window.tipChartInstance.data.labels = tipsData.map(() => ''); // Blank labels for X-axis
      window.tipChartInstance.data.datasets[0].data = tipsData;
      window.tipChartInstance.update();
    });

    // Boot Sequence
    fetchGlobalTheme();
  </script>
</body>
</html>
