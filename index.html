<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deadlock Soul Transfer</title>
  <style>
    /* 1-Bit Sharp Pixel Aesthetic */
    :root {
      --bg-color: #ffffff;
      --fg-color: #000000;
    }

    body {
      background-color: var(--bg-color);
      /* Dithered desktop background */
      background-image: repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), repeating-linear-gradient(45deg, #000 25%, var(--bg-color) 25%, var(--bg-color) 75%, #000 75%, #000);
      background-position: 0 0, 2px 2px;
      background-size: 4px 4px;
      color: var(--fg-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 1rem;
      box-sizing: border-box;
    }

    .window {
      background: var(--bg-color);
      border: 2px solid var(--fg-color);
      box-shadow: 6px 6px 0 var(--fg-color); /* Harsh, sharp drop shadow */
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
    }

    /* Classic striped title bar */
    .title-bar {
      border-bottom: 2px solid var(--fg-color);
      padding: 4px 8px;
      text-align: center;
      background: repeating-linear-gradient(
        0deg,
        var(--bg-color),
        var(--bg-color) 1px,
        var(--fg-color) 1px,
        var(--fg-color) 2px
      );
    }

    .title-bar-text {
      background: var(--bg-color);
      padding: 0 8px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .content {
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 24px;
      text-transform: uppercase;
    }

    .instruction {
      margin-bottom: 16px;
      font-weight: bold;
    }

    .tile-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    button, input {
      font-family: inherit;
      font-size: 16px;
      border: 2px solid var(--fg-color);
      background: var(--bg-color);
      color: var(--fg-color);
      padding: 10px;
      cursor: pointer;
      box-sizing: border-box;
      outline: none;
    }

    button {
      font-weight: bold;
      transition: background 0s, color 0s;
    }

    button:hover, button:active, button.selected {
      background: var(--fg-color);
      color: var(--bg-color); /* Instant 1-bit color inversion */
    }

    .soul-btn {
      flex: 1;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="number"] {
      width: 100%;
      font-size: 18px;
    }

    /* Removes the default spin buttons in WebKit browsers */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      font-size: 18px;
      padding: 14px;
      text-transform: uppercase;
    }

    .hidden {
      display: none !important;
    }

    .success-msg {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

  <div class="window" id="transfer-window">
    <div class="title-bar">
      <span class="title-bar-text">SOUL_TRANSFER_PROTOCOL</span>
    </div>
    <div class="content">
      <h1>Save a Player</h1>
      <p class="instruction">Select soul quantity to transfer:</p>
      
      <div class="tile-row">
        <button type="button" class="soul-btn" data-value="800">800</button>
        <button type="button" class="soul-btn" data-value="1600">1600</button>
        <button type="button" class="soul-btn" data-value="3200">3200</button>
      </div>

      <form id="tip-form">
        <div class="input-group">
          <label for="custom-souls">Custom Allocation:</label>
          <input type="number" id="custom-souls" min="1" placeholder="Enter custom souls..." required>
        </div>
        <button type="submit" class="submit-btn">Send Tips</button>
      </form>
    </div>
  </div>

  <div class="window hidden" id="success-window">
    <div class="title-bar">
      <span class="title-bar-text">TRANSFER_COMPLETE</span>
    </div>
    <div class="content">
      <p class="success-msg"><strong>Thank you for supporting your support.</strong></p>
      <button type="button" class="submit-btn" id="reset-btn">Initiate New Transfer</button>
    </div>
  </div>

  <script>
    // State management and DOM queries
    const soulBtns = document.querySelectorAll('.soul-btn');
    const customInput = document.getElementById('custom-souls');
    const tipForm = document.getElementById('tip-form');
    const transferWindow = document.getElementById('transfer-window');
    const successWindow = document.getElementById('success-window');
    const resetBtn = document.getElementById('reset-btn');

    // Handle tile clicks to populate the custom input
    soulBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove visual selection from all buttons
        soulBtns.forEach(b => b.classList.remove('selected'));
        // Add visual selection to clicked button
        btn.classList.add('selected');
        // Update input field
        customInput.value = btn.getAttribute('data-value');
      });
    });

    // Handle manual input changes (clears button selection if they type a custom number)
    customInput.addEventListener('input', () => {
      soulBtns.forEach(b => b.classList.remove('selected'));
    });

    // Handle form submission
    tipForm.addEventListener('submit', (e) => {
      e.preventDefault(); // Prevents page reload
      
      const soulsToTip = customInput.value;
      
      if(soulsToTip) {
        // Swap windows
        transferWindow.classList.add('hidden');
        successWindow.classList.remove('hidden');
      }
    });

    // Handle reset to go back to the main screen
    resetBtn.addEventListener('click', () => {
      tipForm.reset();
      soulBtns.forEach(b => b.classList.remove('selected'));
      successWindow.classList.add('hidden');
      transferWindow.classList.remove('hidden');
    });
  </script>
</body>
</html>
